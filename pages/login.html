<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | S&amp;J Car</title>
  <link rel="icon" href="../assets/favicon.ico">
  <link rel="stylesheet" href="../style/global.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="container">
    <section class="form-box login-box" aria-labelledby="titulo-login">
      <img src="../assets/LOGO.png" alt="S&amp;J Car" class="logo">
      <h1 id="titulo-login">Bem-vindo</h1>
      <p>Entre na sua conta para continuar.</p>
      <form id="loginForm" novalidate autocomplete="off">
        <div class="input-group">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="nome@exemplo.com" required>
        </div>
        <div class="input-group">
          <label for="senha">Senha</label>
          <div class="senha-wrapper"><input id="senha" name="senha" type="password" autocomplete="current-password" minlength="6" required><button class="toggle-password" type="button" aria-label="Mostrar senha" data-target="senha">&#128065;</button></div>
        </div>
        <button type="submit">Entrar</button>
      </form>
      <p class="form-link">Não possui conta? <a href="cadastro.html">Criar conta</a></p>
    </section>
  </main>
  <div id="footer"></div>
  <script src="../js/loadComponent.js"></script>
  <script>sessionStorage.removeItem('sjcar-usuario');</script>
  <script src="../js/api-auth.js?v=6"></script>
</body>
</html>
