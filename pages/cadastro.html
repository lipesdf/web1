<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | S&amp;J Car</title>
  <link rel="icon" href="../assets/favicon.ico">
  <link rel="stylesheet" href="../style/global.css">
</head>
<body>
  <div id="navbar"></div>
  <main class="container">
    <section class="form-box" aria-labelledby="titulo-cadastro">
      <h1 id="titulo-cadastro">Cadastro</h1>
      <p>Preencha os dados para criar sua conta.</p>
      <form id="cadastroForm" novalidate>
        <div class="input-group"><label for="nome">Nome</label><input id="nome" name="nome" type="text" autocomplete="name" required></div>
        <div class="input-group"><label for="cpf">CPF</label><input id="cpf" name="cpf" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required></div>
        <div class="input-group"><label for="email">E-mail</label><input id="email" name="email" type="email" autocomplete="email" required></div>
        <div class="input-group"><label for="senha">Senha</label><div class="senha-wrapper"><input id="senha" name="senha" type="password" autocomplete="new-password" minlength="6" required><button class="toggle-password" type="button" aria-label="Mostrar senha" data-target="senha">&#128065;</button></div></div>
        <div class="input-group"><label for="telefone">Telefone</label><input id="telefone" name="telefone" type="tel" autocomplete="tel" maxlength="15" placeholder="(00) 00000-0000" required></div>
        <button type="submit">Criar conta</button>
      </form>
      <p class="form-link">Já possui conta? <a href="login.html">Entrar</a></p>
    </section>
  </main>
  <div id="footer"></div>
  <script src="../js/loadComponent.js"></script>
  <script src="../js/api-auth.js?v=6"></script>
</body>
</html>
